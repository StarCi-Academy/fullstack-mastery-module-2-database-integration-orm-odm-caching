# Stack hạ tầng bài 1-typeorm-and-postgresql — chỉ infra, backend chạy local (nest start).
# (EN: Infrastructure stack for 1-typeorm-and-postgresql — infra only, backend runs locally.)
#
# Thư mục: cd fullstack-mastery-module-2-database-integration-orm-odm-caching/1-typeorm-and-postgresql/.docker
# (EN: Working dir: cd fullstack-mastery-module-2-database-integration-orm-odm-caching/1-typeorm-and-postgresql/.docker)
#
# Khởi chạy: docker compose up -d
# (EN: Start: docker compose up -d)
#
# Dừng & xóa: docker compose down -v
# (EN: Stop & clean: docker compose down -v)
name: 1-typeorm-and-postgresql

services:
  # PostgreSQL — persistence cho bài học (TypeORM).
  # (EN: PostgreSQL — persistence for the lesson (TypeORM).)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
    ports:
      # Ánh xạ cổng host 5432 → container 5432 (PostgreSQL).
      # (EN: Map host port 5432 → container 5432 (PostgreSQL).)
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:

networks:
  1-typeorm-and-postgresql:
    name: 1-typeorm-and-postgresql
