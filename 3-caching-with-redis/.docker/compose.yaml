# Stack hạ tầng bài 3-caching-with-redis — chỉ infra, backend chạy local (nest start).
# (EN: Infrastructure stack for 3-caching-with-redis — infra only, backend runs locally.)
#
# Thư mục: cd fullstack-mastery-module-2-database-integration-orm-odm-caching/3-caching-with-redis/.docker
# (EN: Working dir: cd fullstack-mastery-module-2-database-integration-orm-odm-caching/3-caching-with-redis/.docker)
#
# Khởi chạy: docker compose up -d
# (EN: Start: docker compose up -d)
#
# Dừng & xóa: docker compose down -v
# (EN: Stop & clean: docker compose down -v)
name: 3-caching-with-redis

services:
  # PostgreSQL — persistence cho bài học (TypeORM).
  # (EN: PostgreSQL — persistence for the lesson (TypeORM).)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
    ports:
      # Ánh xạ cổng host 5432 → container 5432 (PostgreSQL).
      # (EN: Map host port 5432 → container 5432 (PostgreSQL).)
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # Redis — cache layer cho bài học (CacheModule / cache-manager).
  # (EN: Redis — cache layer for the lesson (CacheModule / cache-manager).)
  redis:
    image: redis:7-alpine
    ports:
      # Ánh xạ cổng host 6379 → container 6379 (Redis).
      # (EN: Map host port 6379 → container 6379 (Redis).)
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:

networks:
  3-caching-with-redis:
    name: 3-caching-with-redis
